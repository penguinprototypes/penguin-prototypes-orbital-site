<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Credits and inspirations for Penguin Prototypes." />
  <title>Credits & Inspirations | Penguin Prototypes</title>
  <link rel="stylesheet" href="/credits/style.css" />
  <script src="/credits/script.js" defer></script>
</head>
<body>
  <main class="credits-page" aria-label="Credits and inspirations archive">
    <section class="detail-panel" aria-live="polite">
      <div class="detail-backdrop" aria-hidden="true"></div>

      <nav class="page-links" aria-label="Page navigation">
        <a href="/" class="home-link">← Return to orbit</a>
      </nav>

      <div class="detail-content">
        <p class="detail-kicker" id="detailType">Credits Archive</p>
        <h1 id="detailName">Select a signal</h1>
        <p class="detail-short" id="detailShort">Choose a name from the cylinder below.</p>

        <div class="detail-description" id="detailDescription"></div>
        <div class="detail-sections" id="detailSections"></div>
        <div class="detail-links" id="detailLinks"></div>
      </div>
    </section>

    <section class="cylinder-panel" aria-label="Credit category cylinder selector">
      <div class="cylinder-glow" aria-hidden="true"></div>

      <div class="category-nav">
        <button class="category-button" id="prevCategory" type="button" aria-label="Previous cylinder category">‹</button>
        <div class="category-title-wrap">
          <p class="category-label">Cylinder</p>
          <h2 id="categoryName">Loading</h2>
          <p class="category-counter" id="categoryCounter"></p>
        </div>
        <button class="category-button" id="nextCategory" type="button" aria-label="Next cylinder category">›</button>
      </div>

      <div class="cylinder-shell" id="cylinderStage" tabindex="0" aria-label="Use mouse wheel or up and down arrow keys to rotate names. Use left and right arrows to switch cylinders.">
        <div class="cylinder-ring" id="cylinderRing">
          <p class="loading-message">Loading archive…</p>
        </div>
      </div>

      <p class="usage-hint">Scroll or use ↑/↓ to rotate the focused cylinder. Click any visible segment to view details. Use ←/→ to rotate the ring of cylinders.</p>
    </section>
  </main>
</body>
</html>
