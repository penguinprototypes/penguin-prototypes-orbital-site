<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/images/pp3.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penguin Prototypes</title>

    <meta property="og:title" content="Penguin Prototypes" />
    <meta property="og:description" content="The future home of Penguin Prototypes" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://penguinprototypes.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Penguin Prototypes" />
    <meta name="twitter:description" content="The future home of Penguin Prototypes" />
  </head>
  <body>
    <div id="app">
      <div class="intro-fade" id="intro-fade" aria-hidden="true"></div>
      <div class="background-layer" id="background-layer" aria-hidden="true"></div>
      <div class="stars" id="stars" aria-hidden="true"></div>

      <main class="page">
        <header class="brand-copy">
          <h1 id="site-title">Penguin Prototypes</h1>
          <p id="site-subtitle">Penguin Prototypes</p>
        </header>

        <section class="system" aria-label="Orbital placeholder scene">
          <div class="scene" id="scene">
            <svg class="orbit-svg world-layer" id="orbit-svg" aria-hidden="true"></svg>
            <div class="body-layer world-layer" id="body-layer"></div>

            <aside class="info-panel" id="info-panel" aria-live="polite" hidden>
              <button class="panel-close" id="panel-close" type="button" aria-label="Close details">×</button>
              <p class="panel-kind" id="panel-kind"></p>
              <h2 class="panel-title" id="panel-title"></h2>
              <div class="panel-copy" id="panel-copy"></div>
              <div class="panel-links" id="panel-links"></div>
            </aside>
          </div>
        </section>

        <nav class="object-navigator" id="object-navigator" aria-label="Orbital object navigator">
          <button class="nav-arrow" id="nav-prev" type="button" aria-label="Previous object">←</button>
          <button class="nav-label" id="nav-current" type="button" aria-label="Focus current object">
            <span class="nav-count" id="nav-count">0 / 0</span>
            <span class="nav-name" id="nav-name">No objects</span>
          </button>
          <button class="nav-arrow" id="nav-next" type="button" aria-label="Next object">→</button>
        </nav>

        <div class="zoom-controls" aria-label="Scene zoom controls">
          <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
          <button id="zoom-reset" type="button" aria-label="Reset zoom and focus">Reset</button>
          <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
        </div>

        <div class="footer-note" id="site-footer">penguinprototypes.com</div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
